background {
    monitor =
    path = ~/Pictures/avatar.jpg
    blur_passes = 1
    blur_size = 4
    brightness = 0.7
}

general {
    hide_cursor = true
}

# Day
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_ALL=C date +"%A")"
    color = rgba(192, 202, 245, 0.70)
    font_size = 90
    font_family = MesloLGS Nerd Font Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo "$(LC_ALL=C date +"%d %B")"
    color = rgba(192, 202, 245, 0.70)
    font_size = 40
    font_family = MesloLGS Nerd Font Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "- $(date +"%H:%M") -"
    color = rgba(122, 162, 247, 0.80)
    font_size = 20
    font_family = MesloLGS Nerd Font Bold
    position = 0, 190
    halign = center
    valign = center
}

# Profile photo
image {
    monitor =
    path = ~/.config/hypr/hyprlock-pfp.png
    border_size = 2
    border_color = rgba(122, 162, 247, 0.65)
    size = 130
    rounding = -1
    position = 0, 40
    halign = center
    valign = center
}

# User box
shape {
    monitor =
    size = 300, 60
    color = rgba(122, 162, 247, 0.1)
    rounding = -1
    border_size = 0
    position = 0, -130
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =  $USER
    color = rgba(192, 202, 245, 0.80)
    font_size = 18
    font_family = MesloLGS Nerd Font Bold
    position = 0, -130
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(122, 162, 247, 0.0)
    inner_color = rgba(122, 162, 247, 0.1)
    font_color = rgb(192, 202, 245)
    check_color = rgba(158, 206, 106, 1.0)
    fail_color = rgba(247, 118, 142, 1.0)
    fade_on_empty = false
    font_family = MesloLGS Nerd Font Bold
    placeholder_text = <i><span foreground="##565f89">🔒 password...</span></i>
    fail_text = <i><span foreground="##f7768e">wrong password!</span></i>
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# Reboot
label {
    monitor =
    text = ↺
    color = rgba(192, 202, 245, 0.6)
    font_size = 50
    onclick = reboot now
    position = 0, 100
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = ⏻
    color = rgba(247, 118, 142, 0.6)
    font_size = 50
    onclick = shutdown now
    position = 120, 100
    halign = center
    valign = bottom
}

# Suspend
label {
    monitor =
    text = ⏸
    color = rgba(192, 202, 245, 0.6)
    font_size = 50
    onclick = systemctl suspend
    position = -120, 100
    halign = center
    valign = bottom
}
