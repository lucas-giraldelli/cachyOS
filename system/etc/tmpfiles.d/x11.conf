# Overrides /usr/lib/tmpfiles.d/x11.conf
#
# The stock file ages these directories at 10d. systemd-tmpfiles-clean.service
# runs daily and does not care that the X session is still alive, so on any
# uptime longer than 10 days it garbage-collects the *live* XWayland socket
# (/tmp/.X11-unix/X1_ and the X1 symlink) and the session's X auth cookie.
# Steam and every other X client then dies with "unable to open X connection"
# / "Authorization required, but no authorization protocol specified", and the
# cookie is unrecoverable because the server only holds it in memory — the fix
# at that point is a full session restart.
#
# Age "-" disables cleanup for these paths; they live on tmpfs and are cleared
# on reboot anyway.
D! /tmp/.X11-unix 1777 root root -
D! /tmp/.ICE-unix 1777 root root -
D! /tmp/.XIM-unix 1777 root root -
D! /tmp/.font-unix 1777 root root -

# Unlink the X11 lock files (unchanged from the stock file)
r! /tmp/.X[0-9]*-lock

# Never age out X authority cookies dropped in /tmp by the compositor.
x /tmp/xauth_*
x /tmp/.Xauthority*
